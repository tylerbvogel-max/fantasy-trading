databases:
  - name: fantasy-trading-db
    plan: free  # Upgrade to "starter" or "standard" for production (backups, no sleep)
    databaseName: fantasy_trading
    user: fantasy_trading

services:
  - type: web
    name: fantasy-trading-api
    runtime: docker
    plan: free  # Upgrade to "starter" for always-on (no cold starts)
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-trading-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: prod
      - key: BOUNTY_WINDOW_MINUTES
        value: "120"
      - key: CORS_ORIGINS
        sync: false  # Set manually: e.g. "https://yourdomain.com,exp://192.168.1.x:8081"
